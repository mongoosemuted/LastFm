<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#0c0c0e; color:#eeeef5; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

/* LOGIN */
#login { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:1.5rem; gap:1.5rem; }
#dashboard { display:none; flex-direction:column; min-height:100vh; }
.logo { font-size:clamp(3rem,12vw,4.5rem); font-weight:900; background:linear-gradient(135deg,#e5383b,#f4845f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; line-height:1; }
.logo-sub { font-size:.65rem; color:#6e6e82; letter-spacing:.22em; text-transform:uppercase; margin-top:.4rem; text-align:center; }
.card { background:#18181d; border:1px solid #25252e; border-radius:16px; padding:1.75rem; width:100%; max-width:380px; display:flex; flex-direction:column; gap:1rem; }
label { font-size:.6rem; color:#6e6e82; letter-spacing:.18em; text-transform:uppercase; display:block; margin-bottom:.35rem; font-family:monospace; }
input[type=text], input[type=date] { width:100%; background:#21212a; border:1px solid #25252e; border-radius:8px; padding:.72rem 1rem; color:#eeeef5; font-family:monospace; font-size:.9rem; outline:none; -webkit-appearance:none; }
input[type=text]:focus, input[type=date]:focus { border-color:#e5383b; }
input::placeholder { color:#6e6e82; }
.hint { font-size:.7rem; color:#6e6e82; line-height:1.7; }
.hint a { color:#f4845f; }
.error { background:rgba(229,56,59,.1); border:1px solid rgba(229,56,59,.3); border-radius:8px; padding:.7rem 1rem; font-size:.75rem; color:#ff8080; line-height:1.6; display:none; }
.primary { width:100%; background:linear-gradient(135deg,#e5383b,#f4845f); color:#fff; border:none; border-radius:8px; padding:.85rem; font-family:monospace; font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; cursor:pointer; }
.primary:disabled { opacity:.4; cursor:not-allowed; }

/* TOPBAR */
.topbar { background:#131316; border-bottom:1px solid #25252e; padding:.85rem 1.25rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-logo { font-size:1.3rem; font-weight:900; background:linear-gradient(135deg,#e5383b,#f4845f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.ghost { background:none; border:1px solid #25252e; border-radius:6px; padding:.28rem .6rem; color:#6e6e82; font-family:monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }

/* CONTROLS */
.controls { background:#131316; border-bottom:1px solid #25252e; padding:.75rem 1.25rem; display:flex; flex-direction:column; gap:.6rem; }
.row { display:flex; align-items:center; gap:.4rem; flex-wrap:wrap; }
.row-label { font-family:monospace; font-size:.6rem; color:#6e6e82; letter-spacing:.14em; text-transform:uppercase; white-space:nowrap; min-width:40px; }
.pill { background:#21212a; border:1px solid #25252e; border-radius:20px; padding:.22rem .6rem; color:#6e6e82; font-family:monospace; font-size:.6rem; cursor:pointer; white-space:nowrap; -webkit-appearance:none; }
.pill.on { background:rgba(229,56,59,.15); border-color:#e5383b; color:#e5383b; }
#custom-row { display:none; }
input[type=date] { padding:.28rem .5rem; font-size:.65rem; width:auto; color-scheme:dark; }
.search-input { background:#21212a; border:1px solid #25252e; border-radius:7px; padding:.28rem .5rem; color:#eeeef5; font-family:monospace; font-size:.65rem; outline:none; width:160px; -webkit-appearance:none; }
.search-input:focus { border-color:#e5383b; }
.refresh { background:linear-gradient(135deg,#e5383b,#f4845f); border:none; border-radius:7px; padding:.28rem .7rem; color:#fff; font-family:monospace; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }
.chips { display:flex; gap:.4rem; flex-wrap:wrap; align-items:center; }
.chip { background:rgba(229,56,59,.1); border:1px solid rgba(229,56,59,.3); border-radius:20px; padding:.15rem .5rem; font-family:monospace; font-size:.6rem; color:#f4845f; display:flex; align-items:center; gap:.3rem; }
.chip button { background:none; border:none; color:#e5383b; cursor:pointer; font-size:.7rem; line-height:1; padding:0; }

/* CONTENT */
.content { padding:1.25rem; max-width:700px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:1.5rem; }
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:.65rem; }
.stat-card { background:#18181d; border:1px solid #25252e; border-radius:12px; padding:1rem 1.1rem; position:relative; overflow:hidden; }
.stat-card::before { content:’’; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#e5383b,#f4845f); }
.stat-label { font-family:monospace; font-size:.58rem; color:#6e6e82; letter-spacing:.14em; text-transform:uppercase; margin-bottom:.3rem; }
.stat-value { font-size:1.8rem; font-weight:900; line-height:1; background:linear-gradient(135deg,#eeeef5,#999); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.stat-sub { font-size:.62rem; color:#6e6e82; margin-top:.15rem; }
.section-title { font-size:1.1rem; font-weight:800; color:#eeeef5; margin-bottom:.85rem; }
.chart-card { background:#18181d; border:1px solid #25252e; border-radius:14px; padding:1.25rem; }
.artist-row { background:#18181d; border:1px solid #25252e; border-radius:10px; padding:.72rem .9rem; display:grid; grid-template-columns:1.4rem 1fr auto; align-items:center; gap:.7rem; cursor:pointer; margin-bottom:.45rem; transition:border-color .2s; }
.artist-row.pinned { border-color:rgba(229,56,59,.45); background:rgba(229,56,59,.04); }
.artist-num { font-family:monospace; font-size:.65rem; color:#6e6e82; text-align:right; }
.artist-row.pinned .artist-num { color:#e5383b; }
.artist-name { font-size:.85rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:.22rem; }
.artist-row.pinned .artist-name { color:#f4845f; }
.bar-bg { background:#21212a; border-radius:99px; height:4px; overflow:hidden; }
.bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#e5383b,#f4845f); }
.artist-time { font-family:monospace; font-size:.68rem; color:#6e6e82; white-space:nowrap; text-align:right; }
.artist-time small { display:block; font-size:.57rem; color:rgba(110,110,130,.55); }
.loading { display:flex; flex-direction:column; align-items:center; gap:1rem; padding:3rem; }
.spinner { width:28px; height:28px; border:2px solid #25252e; border-top-color:#e5383b; border-radius:50%; animation:spin .65s linear infinite; }
.empty { text-align:center; padding:2.5rem; color:#6e6e82; font-family:monospace; font-size:.75rem; line-height:1.9; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>

</head>
<body>

<!-- LOGIN -->

<div id="login">
  <div>
    <div class="logo">LAST.FM</div>
    <div class="logo-sub">Listening Dashboard</div>
  </div>
  <div class="card">
    <div>
      <label>Your Last.fm Username</label>
      <input type="text" id="inp-user" placeholder="username" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <div>
      <label>API Key</label>
      <input type="text" id="inp-key" placeholder="paste your api key here" autocorrect="off" autocapitalize="none" spellcheck="false">
    </div>
    <p class="hint">
      Need a free API key? Go to <a href="https://www.last.fm/api/account/create" target="_blank">last.fm/api</a>,
      type anything in "Application name", tap Submit, and copy the key it gives you.
    </p>
    <div class="error" id="err"></div>
    <button class="primary" id="login-btn" onclick="doLogin()">Let's go →</button>
  </div>
</div>

<!-- DASHBOARD -->

<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">LAST.FM</div>
    <div style="display:flex;align-items:center;gap:.6rem">
      <span id="topbar-user" style="font-family:monospace;font-size:.72rem;color:#6e6e82"></span>
      <button class="ghost" onclick="doLogout()">Log out</button>
    </div>
  </div>

  <div class="controls">
    <div class="row">
      <span class="row-label">Range</span>
      <button class="pill on" data-days="7" onclick="setPreset(this)">7 days</button>
      <button class="pill" data-days="14" onclick="setPreset(this)">14 days</button>
      <button class="pill" data-days="30" onclick="setPreset(this)">30 days</button>
      <button class="pill" data-days="90" onclick="setPreset(this)">3 months</button>
      <button class="pill" data-days="0" onclick="setPreset(this)">Custom</button>
    </div>
    <div class="row" id="custom-row">
      <input type="date" id="d-from" style="color-scheme:dark">
      <span style="color:#6e6e82;font-size:.7rem">→</span>
      <input type="date" id="d-to" style="color-scheme:dark">
      <button class="refresh" onclick="loadData()">Go</button>
    </div>
    <div class="row">
      <span class="row-label">Artist</span>
      <input class="search-input" id="search" placeholder="Search artists…" oninput="filterArtists()" autocorrect="off" autocapitalize="none">
      <button class="refresh" onclick="loadData()">↻ Refresh</button>
    </div>
    <div class="chips" id="chips" style="display:none"></div>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<script>
const API = 'https://ws.audioscrobbler.com/2.0/';
let APIKEY = '', USER = '', allArtists = [], pinned = new Set(), activeDays = 7;
let chart = null;

function fmt(m) {
  if (m < 1) return '0m';
  if (m < 60) return Math.round(m) + 'm';
  const h = Math.floor(m/60), r = Math.round(m%60);
  if (h < 24) return r ? h+'h '+r+'m' : h+'h';
  const d = Math.floor(h/24), rh = h%24;
  return rh ? d+'d '+rh+'h' : d+'d';
}

function getRange() {
  const now = Math.floor(Date.now()/1000);
  if (activeDays > 0) return { from: now - activeDays*86400, to: now };
  const f = document.getElementById('d-from').value;
  const t = document.getElementById('d-to').value;
  if (f && t) return { from: Math.floor(new Date(f)/1000), to: Math.floor(new Date(t)/1000)+86399 };
  return { from: now - 7*86400, to: now };
}

function dbetween(f,t) { return Math.max(1, Math.round((t-f)/86400)); }

async function apiFetch(params) {
  const qs = new URLSearchParams({...params, api_key: APIKEY, format: 'json'});
  const r = await fetch(API + '?' + qs);
  if (!r.ok) throw new Error('Network error (HTTP '+r.status+'). Check your internet connection.');
  const d = await r.json();
  if (d.error === 6) throw new Error('Username not found — check your spelling.');
  if (d.error === 10) throw new Error('Invalid API key — make sure you copied it all.');
  if (d.error) throw new Error(d.message || 'Last.fm error '+d.error);
  return d;
}

async function doLogin() {
  const u = document.getElementById('inp-user').value.trim();
  const k = document.getElementById('inp-key').value.trim();
  const errEl = document.getElementById('err');
  const btn = document.getElementById('login-btn');
  errEl.style.display = 'none';
  if (!u) { showErr('Please enter your Last.fm username.'); return; }
  if (!k) { showErr('Please enter your API key.'); return; }
  if (k.length < 20) { showErr('That API key looks too short — copy the whole thing.'); return; }
  btn.disabled = true; btn.textContent = 'Connecting…';
  APIKEY = k; USER = u;
  try {
    const d = await apiFetch({ method:'user.getinfo', user:u });
    document.getElementById('topbar-user').textContent = d.user?.realname || u;
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'flex';
    loadData();
  } catch(e) {
    showErr(e.message);
    btn.disabled = false; btn.textContent = "Let's go →";
    APIKEY = ''; USER = '';
  }
}

function showErr(m) { const e = document.getElementById('err'); e.textContent = m; e.style.display = 'block'; }

function doLogout() {
  APIKEY=''; USER=''; allArtists=[]; pinned.clear();
  document.getElementById('inp-user').value='';
  document.getElementById('inp-key').value='';
  document.getElementById('login-btn').disabled=false;
  document.getElementById('login-btn').textContent="Let's go →";
  document.getElementById('search').value='';
  document.getElementById('err').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('dashboard').style.display='none';
  renderChips();
}

function setPreset(btn) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('on'));
  btn.classList.add('on');
  activeDays = parseInt(btn.dataset.days);
  document.getElementById('custom-row').style.display = activeDays === 0 ? 'flex' : 'none';
  if (activeDays !== 0) loadData();
}

// Set default custom dates
(function() {
  const n = new Date(), p = new Date(+n - 7*86400*1000);
  document.getElementById('d-to').value = n.toISOString().slice(0,10);
  document.getElementById('d-from').value = p.toISOString().slice(0,10);
})();

function togglePin(name) {
  pinned.has(name) ? pinned.delete(name) : pinned.add(name);
  renderChips();
  document.querySelectorAll('.artist-row[data-name]').forEach(row => {
    const n = decodeURIComponent(row.getAttribute('data-name'));
    pinned.has(n) ? row.classList.add('pinned') : row.classList.remove('pinned');
    row.querySelector('.artist-num').style.color = pinned.has(n) ? '#e5383b' : '#6e6e82';
    row.querySelector('.artist-name').style.color = pinned.has(n) ? '#f4845f' : '#eeeef5';
  });
  updateStats();
}

function renderChips() {
  const el = document.getElementById('chips');
  if (!pinned.size) { el.style.display='none'; el.innerHTML=''; return; }
  el.style.display = 'flex';
  el.innerHTML = [...pinned].map(n =>
    `<div class="chip">${n}<button onclick="togglePin('${n.replace(/'/g,"\\'")}')">✕</button></div>`
  ).join('') + `<button class="ghost" onclick="pinned.clear();renderChips();renderArtists()">Clear all</button>`;
}

function filterArtists() { renderArtists(); updateStats(); }

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return allArtists.filter(a => (!pinned.size || pinned.has(a.name)) && (!q || a.name.toLowerCase().includes(q)));
}

async function loadData() {
  const {from, to} = getRange();
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p style="font-family:monospace;font-size:.7rem;color:#6e6e82;margin-top:.5rem" id="load-status">Fetching your scrobbles…</p></div>';
  try {
    let page=1, tracks=[];
    while(true) {
      const s = document.getElementById('load-status');
      if(s) s.textContent = page===1 ? 'Fetching your scrobbles…' : 'Fetching page '+page+'…';
      const d = await apiFetch({method:'user.getrecenttracks',user:USER,limit:200,from,to,page});
      const list = d.recenttracks?.track || [];
      const arr = Array.isArray(list) ? list : [list];
      const real = arr.filter(t => !t['@attr']?.nowplaying);
      tracks.push(...real);
      const tot = parseInt(d.recenttracks?.['@attr']?.totalPages||'1');
      if(page>=tot||!real.length) break;
      page++; if(page>50) break;
    }
    if (!tracks.length) {
      document.getElementById('content').innerHTML = '<div class="empty">No scrobbles found.<br>Try a wider date range.</div>';
      allArtists=[]; return;
    }
    const amap={}, dmap={};
    tracks.forEach(t => {
      const n = t.artist?.['#text'] || 'Unknown';
      amap[n] = (amap[n]||0)+1;
      const ts = parseInt(t.date?.uts||'0');
      if(ts) { const k=new Date(ts*1000).toISOString().slice(0,10); dmap[k]=(dmap[k]||0)+1; }
    });
    allArtists = Object.entries(amap).map(([name,plays])=>({name,plays,mins:plays*3.5})).sort((a,b)=>b.plays-a.plays);
    renderDashboard(tracks.length, dmap, from, to);
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty">'+e.message+'</div>';
  }
}

function renderDashboard(total, dmap, from, to) {
  const days = dbetween(from,to);
  const filtered = getFiltered();
  const totalMins = filtered.reduce((s,a)=>s+a.mins,0);

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Total Plays</div><div class="stat-value" id="st-plays">${total.toLocaleString()}</div><div class="stat-sub">scrobbles</div></div>
      <div class="stat-card"><div class="stat-label">Listen Time</div><div class="stat-value" id="st-time">${fmt(totalMins)}</div><div class="stat-sub">~3.5 min/track</div></div>
      <div class="stat-card"><div class="stat-label">Daily Average</div><div class="stat-value" id="st-avg">${fmt(totalMins/days)}</div><div class="stat-sub">per day</div></div>
      <div class="stat-card"><div class="stat-label">Artists</div><div class="stat-value" id="st-artists">${filtered.length}</div><div class="stat-sub">unique</div></div>
    </div>
    <div><div class="section-title">📈 Timeline</div><div class="chart-card"><canvas id="chart" height="110"></canvas></div></div>
    <div><div class="section-title">🎵 Top Artists <span style="font-size:.6rem;color:#6e6e82;font-weight:400">tap to pin</span></div><div id="artist-list"></div></div>`;

  renderTimeline(dmap, from, to);
  renderArtists();
}

function updateStats() {
  const {from,to} = getRange();
  const filtered = getFiltered();
  const m = filtered.reduce((s,a)=>s+a.mins,0);
  const days = dbetween(from,to);
  const $ = id => document.getElementById(id);
  if($('st-plays')) $('st-plays').textContent = filtered.reduce((s,a)=>s+a.plays,0).toLocaleString();
  if($('st-time'))  $('st-time').textContent  = fmt(m);
  if($('st-avg'))   $('st-avg').textContent   = fmt(m/days);
  if($('st-artists')) $('st-artists').textContent = filtered.length;
}

function renderArtists() {
  const el = document.getElementById('artist-list'); if(!el) return;
  const filtered = getFiltered();
  updateStats();
  if(!filtered.length) { el.innerHTML='<div class="empty">No artists match.</div>'; return; }
  const top = filtered[0].plays;
  el.innerHTML = filtered.slice(0,100).map((a,i) => `
    <div class="artist-row${pinned.has(a.name)?' pinned':''}" data-name="${encodeURIComponent(a.name)}" onclick="togglePin(decodeURIComponent(this.getAttribute('data-name')))">
      <div class="artist-num">${i+1}</div>
      <div>
        <div class="artist-name">${a.name.replace(/</g,'&lt;')}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${(a.plays/top*100).toFixed(1)}%"></div></div>
      </div>
      <div class="artist-time">${fmt(a.mins)}<small>${a.plays.toLocaleString()} plays</small></div>
    </div>`).join('');
}

function renderTimeline(dmap, from, to) {
  const ctx = document.getElementById('chart')?.getContext('2d'); if(!ctx) return;
  if(chart) { chart.destroy(); chart=null; }
  const labels=[], values=[];
  const d=new Date(from*1000); d.setHours(0,0,0,0);
  const end=new Date(to*1000); end.setHours(23,59,59,0);
  while(d<=end) {
    const k=d.toISOString().slice(0,10);
    labels.push(k.slice(5)); values.push(dmap[k]||0);
    d.setDate(d.getDate()+1);
  }
  const gr=ctx.createLinearGradient(0,0,0,130);
  gr.addColorStop(0,'rgba(229,56,59,.35)'); gr.addColorStop(1,'rgba(229,56,59,0)');
  chart = new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data:values,borderColor:'#e5383b',borderWidth:2,backgroundColor:gr,fill:true,tension:.4,pointRadius:labels.length>20?0:3,pointHoverRadius:5,pointBackgroundColor:'#f4845f',pointBorderColor:'transparent'}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:'#18181d',borderColor:'#25252e',borderWidth:1,titleColor:'#6e6e82',bodyColor:'#eeeef5',callbacks:{label:i=>'  '+i.raw+' plays (~'+fmt(i.raw*3.5)+')'}}},scales:{x:{ticks:{color:'#6e6e82',maxTicksLimit:8,maxRotation:0,font:{size:9}},grid:{color:'rgba(37,37,46,.8)'},border:{color:'#25252e'}},y:{beginAtZero:true,ticks:{color:'#6e6e82',font:{size:9}},grid:{color:'rgba(37,37,46,.8)'},border:{color:'#25252e'}}}}
  });
}
</script>

</body>
</html>
